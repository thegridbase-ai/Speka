name: Speka
options:
  bundleIdPrefix: com.thegridbase
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_ASSET_PATHS: ""
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  VocabularyKit:
    path: Packages/VocabularyKit
  GridBaseUIKit:
    path: Packages/GridBaseUIKit
  SpekaUI:
    path: Packages/SpekaUI
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

targets:
  Speka:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Speka
    dependencies:
      - package: VocabularyKit
        product: VocabularyKit
      - package: GridBaseUIKit
        product: GridBaseUIKit
      - package: SpekaUI
        product: SpekaUI
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thegridbase.speka
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Use an explicit Info.plist (below) instead of the auto-generated one so
        # we can add the Google OAuth CFBundleURLTypes entry. Must override the
        # global GENERATE_INFOPLIST_FILE: YES set in `settings.base`.
        GENERATE_INFOPLIST_FILE: NO
    # Explicit Info.plist generated by xcodegen. Contains every key the old
    # INFOPLIST_KEY_* generation provided (display name, version, launch screen,
    # orientations) plus the Google Sign-In URL scheme (reversed client ID from
    # GoogleService-Info.plist, PROJECT_ID futurelex-80a87).
    info:
      path: Speka/Info.plist
      properties:
        CFBundleDisplayName: Speka
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.708286806460-lb30jpbt5ikq3ald3dou64irs117bml5
