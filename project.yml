name: Speka
options:
  bundleIdPrefix: com.thegridbase
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_ASSET_PATHS: ""
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  VocabularyKit:
    path: Packages/VocabularyKit
  GridBaseUIKit:
    path: Packages/GridBaseUIKit
  SpekaUI:
    path: Packages/SpekaUI
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

targets:
  Speka:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Speka
    dependencies:
      - package: VocabularyKit
        product: VocabularyKit
      - package: GridBaseUIKit
        product: GridBaseUIKit
      - package: SpekaUI
        product: SpekaUI
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thegridbase.speka
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Speka
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # ─────────────────────────────────────────────────────────────────────────
    # TODO (manual, after dropping GoogleService-Info.plist): Google Sign-In
    # needs a CFBundleURLTypes entry whose URL scheme is the *reversed* iOS
    # client ID from the plist (the `REVERSED_CLIENT_ID` value, which looks like
    # `com.googleusercontent.apps.XXXXXXXX-YYYY`).
    #
    # Because GENERATE_INFOPLIST_FILE is YES, add it under this target as:
    #
    #   info:
    #     path: Speka/Info.plist        # XcodeGen will generate this file
    #     properties:
    #       CFBundleURLTypes:
    #         - CFBundleURLSchemes:
    #             - com.googleusercontent.apps.REVERSED_CLIENT_ID_HERE
    #
    # Then re-run `xcodegen generate`. Do NOT invent the value — copy it verbatim
    # from GoogleService-Info.plist. Without this, email/password sign-in still
    # works once the plist is present; only the Google OAuth round-trip needs it.
    # ─────────────────────────────────────────────────────────────────────────
