name: Speka
options:
  bundleIdPrefix: com.thegridbase
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_ASSET_PATHS: ""
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  VocabularyKit:
    path: Packages/VocabularyKit
  GridBaseUIKit:
    path: Packages/GridBaseUIKit
  SpekaUI:
    path: Packages/SpekaUI

targets:
  Speka:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Speka
    dependencies:
      - package: VocabularyKit
        product: VocabularyKit
      - package: GridBaseUIKit
        product: GridBaseUIKit
      - package: SpekaUI
        product: SpekaUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thegridbase.speka
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Speka
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
